{% load static %}
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>{% block title%}Сервис ДДС{%endblock%}</title>
    <link rel="stylesheet" href="{% static 'bootstrap/css/bootstrap.min.css'%}">
    <link rel="stylesheet" href="{% static 'bootstrap/css/bootstrap-icons.min.css'%}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container-fluid px-3 px-lg-4">
            <button class="navbar-toggler fw-bold border-0 px-1"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#navbarNav"
            >
                <span class="navbar-toggler-icon" style="color: #FFFFFF;"></span>
            </button>

            <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
                <ul class="navbar-nav" style="color: #FFFFFF;">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'cashflow_list' %}">Главная</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin" target="_blank">Справочники</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container-fluid min-vh-100 text-center bg-light py-3 px-3 px-lg-5">
        {% block content %}{%endblock%}
    </div>

    <script src="{% static 'bootstrap/js/bootstrap.bundle.min.js'%}"></script>
    <script src="{% static 'js/update_dependent_fields.js'%}"></script>
</body>
</html>
